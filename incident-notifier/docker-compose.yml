services:
  notifier:
    build: .
    container_name: incident-notifier
    restart: unless-stopped
    ports:
      - "5080:5080"
    volumes:
      - ./config:/config
      - ./data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ./config/secrets.env
    environment:
      - TZ=Europe/Berlin

