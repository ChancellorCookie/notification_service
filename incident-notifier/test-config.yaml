poll:
  url: http://localhost:8080/fake
  interval_seconds: 9999
  timeout_seconds: 2
  response:
    items_path: ''
    fields:
      id: id
      title: title
      severity: severity
  severities:
  - critical
  - warning
  - info
escalation:
  notify_on_resolved: true
  stages:
    critical:
    - after_minutes: 0
      channels:
      - email_gmail
    - after_minutes: 15
      channels:
      - email_gmail
    warning:
    - after_minutes: 0
      channels:
      - email_gmail
channels:
  email_gmail:
    type: email
    smtp_host: smtp.gmail.com
    smtp_port: 587
    use_starttls: true
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    from_addr: ${SMTP_USER}
    to_addrs:
    - ${NOTIFY_TO}
state:
  db_path: ./test-state.db
logging:
  level: INFO
