        - serverTimestamp
        - statusCode
        - value
      properties:
        serverTimestamp:
          type: string
          format: date-time
        sourceTimestamp:
          type: string
          format: date-time
        statusCode:
          type: string
        value:
          oneOf:
            - type: number
            - type: string
            - type: boolean
    HistoryReadResponse:
