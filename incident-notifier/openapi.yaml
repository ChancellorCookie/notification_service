                  type: number
                high:
                  type: number
                low:
                  type: number
                'off':
                  type: number
                open:
                  type: number
            messages:
              type: number
    EcoRecommendations:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: string
              priority:
                type: string
                enum:
                  - low
                  - medium
                  - high
    AutomationBase:
      type: object
      properties:
        roomId:
          type: string
          description: Room ID where automation is active
        deviceId:
          type: string
          description: Device ID for the automation
        name:
          type: string
          description: Automation name
        description:
          type: string
          description: Automation description
        enabled:
          type: boolean
          description: Indicates if automation is enabled
        schedule:
          $ref: '#/components/schemas/AutomationSchedule'
        targetFunction:
          $ref: '#/components/schemas/AutomationFunction'
      required:
        - roomId
        - deviceId
        - name
        - schedule
        - targetFunction
    Automation:
      allOf:
        - $ref: '#/components/schemas/AutomationBase'
        - type: object
          properties:
            id:
              type: string
              description: Unique automation ID
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              nullable: true
              format: date-time
          required:
            - id
            - created_at
            - updated_at
    AutomationSchedule:
      type: object
      properties:
        start:
          type: string
          format: time
          nullable: true
          example: '08:00:00'
          description: 'Time of day (HH:mm:ss) when to start the automation'
        end:
          type: string
          format: time
          nullable: true
          example: '18:00:00'
          description: 'Time of day (HH:mm:ss) when to stop the automation'
        period:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          description: Days of Week when to execute the automation (Starting at Monday)
      required:
        - start
        - end
        - period
    AutomationFunction:
      type: object
      properties:
        path:
          type: string
          example: DeviceSet/S1-1016939/FunctionalUnitSet/Fumehood/FunctionSet/Light
          description: >-
            Browse Path to a LADSControlFunction which shall be executed or modified with a targetValue
        targetValueStart:
          type: string
          nullable: true
          example: 'On'
          description: >-
            TargetValue to set when automation is started. If null, the LADS start() function will be called
        targetValueEnd:
          type: string
          nullable: true
          example: 'Off'
          description: >-
            TargetValue to set when automation is stopped. If null, the LADS stop() function will be called
      required:
        - path
        - targetValueStart
        - targetValueEnd
    AutomationInput:
      allOf:
        - $ref: '#/components/schemas/AutomationBase'
        - type: object
          properties:
            id:
              type: string
              description: Optional automation ID (if client-side generated)
      type: object
      properties:
        roomId:
          type: string
          description: Room ID where automation is active
        deviceId:
          type: string
          description: Device ID for the automation
        name:
          type: string
          description: Automation name
        description:
          type: string
          description: Automation description
      required:
        - roomId
        - deviceId
        - name
    AutomationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Automation'
        meta:
          type: object
          properties:
            total:
              type: integer
              description: Total number of items
            page:
              type: integer
              description: Current page number
            perPage:
              type: integer
              description: Items per page
            query:
              type: object
              properties:
                room:
                  type: string
                  nullable: true
                  description: Room filter (echoed from request)
                device:
                  type: array
                  items:
                    type: string
                  description: Device filter (echoed from request)
    Incident:
      type: object
      properties:
        incidentId:
          type: string
          description: UUID that identifies the incident
          example: bd573770-a23c-44e1-9125-3bd33eb0e44d
        type:
          type: string
          description: unique string that represents the incident type
          example: de.waldner.ac4.w_sc_ls_verd_warn
        code:
          type: string
          description: Manufacturer code that represents the incident type
        message:
          type: string
          description: Human readable message that describes the incident
        severity:
          $ref: '#/components/schemas/IncidentSeverity'
        maxSeverity:
          allOf:
            - $ref: '#/components/schemas/IncidentSeverity'
          description: >
            Worst severity the episode ever reached (sharpest escalation). `severity` is the CURRENT grade of the alarm; `maxSeverity` stays at the peak even after the alarm de-escalates or resolves. Use this for the worst-grade headline/lamp.

        active:
          type: boolean
          description: Indicates if the incident is currently active or has been resolved
        status:
          $ref: '#/components/schemas/IncidentStatus'
        context:
          type: string
          description: Path the device or function that is affected by the incident
          example: DeviceSet/S1-1016939/FunctionalUnitSet/Fumehood/FunctionSet/Airflow
        eventId:
          type: string
          description: Event that initiated this incident.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
        help:
          type: string
          description: Advise how to fix or handle the incident
          nullable: true
        comment:
          type: string
          description: >
            Last operator comment recorded against this incident's episode — populated from Acknowledge/Confirm/Reset audit events. Empty when no comment has been written yet.

          nullable: true
        acknowledged:
          type: boolean
          description: >
            True if any AuditConditionAcknowledge event was recorded during this episode. Independent of `confirmed` — both can be true when the operator first acked, then confirmed.

        confirmed:
          type: boolean
          description: >
            True if any AuditConditionConfirm event was recorded during this episode.

        reported:
          type: boolean
          description: >
            True if any AuditConditionReportedEventType (Essentim companion spec, ns=…;i=15001) event was recorded during this episode. Independent of `acknowledged` and `confirmed`. Sticky.

        highHighLimit:
          type: number
          description: Critical-high threshold currently configured for the source.
        highLimit:
          type: number
          description: Warning-high threshold currently configured for the source.
        lowLimit:
          type: number
          description: Warning-low threshold currently configured for the source.
        lowLowLimit:
          type: number
          description: Critical-low threshold currently configured for the source.
        flapCount:
          type: integer
          description: >
            Number of Part-9 ConditionBranches folded into this episode — i.e. how many times the alarm flapped (active→normal while un-acked) within the episode window. Only set when the source actually flapped (≥ MIN_FLAP_RUN); absent otherwise. Branches are NOT surfaced as separate incidents; they roll up here plus into the acknowledged/confirmed/reported flags.

          minimum: 4
        strictAudited:
          type: boolean
          description: >
            Whether this alarm needs an explicit Confirm to close (strict OPC-UA A&C: New→Ack→Confirm) or whether Acknowledge is the terminal action (New→Ack). Derived from the OPC-UA ConfirmedState presence (decided per alarm in the proxy installer). When false, the UI must not require/offer Confirm — Acknowledge alone closes the incident.

      required:
        - incidentId
        - type
        - message
        - severity
        - active
        - status
        - context
        - createdAt
        - updatedAt
        - closedAt
    IncidentHistory:
      type: object
      properties:
        incidentId:
          type: string
          description: UUID of the updated incident
          example: bd573770-a23c-44e1-9125-3bd33eb0e44d
        updatedAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/IncidentStatus'
        origin:
          type: string
          enum:
            - source
            - user
            - service
          description: Indicates who or what initiated the status update
        originId:
          type: string
          description: Id of the user/device that initiated the status update
        message:
          type: string
          description: >
            The event's message — for ack/confirm/reset events this is the operator-supplied comment; for alarm-state events it's the condition message ("Condition is X and state is HighHigh"). Empty when the source event had no message.

          nullable: true
        flapCount:
          type: integer
          description: >
            Set on synthetic entries that aggregate a run of adjacent NEW/RESOLVED transitions (alarm value oscillating around its threshold). When present, this single row represents `flapCount` collapsed source events; `updatedAt` is the newest of the run and `flapStartedAt` is the oldest. Absent on regular entries.

          minimum: 4
        flapStartedAt:
          type: string
          format: date-time
          description: >
            Timestamp of the oldest event in a collapsed flap-run. Only set together with `flapCount`.

      required:
        - incidentId
        - updatedAt
        - status
    IncidentHistoryInput:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/IncidentStatus'
        message:
          type: string
          description: |
            additional message to justify the status change
      required:
        - status
    IncidentStatus:
      type: string
      enum:
        - NEW
        - RESOLVED
        - ACKNOWLEDGED
        - CONFIRMED
        - REPORTED
        - CLOSED
        - UPDATED
      description: |
        Status of an incident:
          * NEW: Is still active
          * RESOLVED: Underlaying alarm has normalized. Incident needs no further user interaction
          * ACKNOWLEDGED: User has acknowledged (AuditConditionAcknowledge) the alarm — taking ownership.
          * CONFIRMED: User has confirmed (AuditConditionConfirm) the alarm — declaring it handled.
          * REPORTED: User has reported (AuditConditionReportedEventType — Essentim companion spec) the alarm — escalation/notification step, distinct from Ack.
          * CLOSED: Incident has been closed by user, underlaying alarm may be active or not
          * UPDATED: Generic operator/service audit event (e.g. alarm thresholds changed via the override API); detail is in `message`.
    IncidentSeverity:
      type: string
      enum:
        - NOTICE
        - INFO
        - WARNING
        - ALERT
        - ERROR
      description: Severity of an incident
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
        offset:
          type: integer
          description: Number of items skipped before the returned results
        limit:
          type: integer
          description: Maximum number of items returned
      required:
        - total
        - offset
        - limit
    IncidentResponse:
      $ref: '#/components/schemas/Incident'
    IncidentHistoryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IncidentHistory'
        meta:
          type: object
          properties:
            items:
              $ref: '#/components/schemas/PaginationMeta'
    IncidentQueryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Incident'
        meta:
          type: object
          properties:
            items:
              $ref: '#/components/schemas/PaginationMeta'
            query:
              $ref: '#/components/schemas/IncidentQueryMeta'
          required:
            - items
            - query
    IncidentQueryMeta:
      type: object
      properties:
        room:
          type: string
          description: Room query condition that has been applied to the result
        context:
          type: string
          description: Device query condition that has been applied to the result
        active:
          type: boolean
          description: >-
            Device query condition that has been applied to filter for active state
        severity:
          type: array
          items:
            $ref: '#/components/schemas/IncidentSeverity'
          description: Severity filter that has been applied to the result
        status:
          type: array
          items:
            $ref: '#/components/schemas/IncidentStatus'
    IncidentInput:
      type: object
      description: Input for creating a new incident
      properties:
        type:
          type: string
          description: Unique string that represents the incident type
          example: alarm.threshold.high
        code:
          type: string
          description: Manufacturer code that represents the incident type
        message:
          type: string
          description: Human readable message that describes the incident
          example: 'Threshold alarm: High (limit: 85.0)'
        severity:
          $ref: '#/components/schemas/IncidentSeverity'
        roomId:
          type: string
          description: Room that is affected by the incident
          example: R1.01
        context:
          type: string
          description: Path to the device or function that is affected by the incident
          example: >-
            DeviceSet/S1-1016939/FunctionalUnitSet/Fumehood/FunctionSet/Temperature
        help:
          type: string
          description: Advise how to fix or handle the incident
      required:
        - type
        - message
        - severity
        - roomId
        - context
    AckAlarmRequest:
      type: object
      title: AckAlarmRequest
      properties:
        comment:
          type: string
          description: Human-readable comment recorded with the acknowledge event
    ConfirmAlarmRequest:
      type: object
      title: ConfirmAlarmRequest
      properties:
        comment:
          type: string
          description: Human-readable comment recorded with the confirm event
    ReportAlarmRequest:
      type: object
      title: ReportAlarmRequest
      properties:
        comment:
          type: string
          description: Human-readable comment recorded with the report event
    ResetAlarmRequest:
      type: object
      title: ResetAlarmRequest
      properties:
        comment:
          type: string
          description: Audit comment recorded with the reset (uses Reset2)
    SetAlarmLatchedRequest:
      type: object
      title: SetAlarmLatchedRequest
      required:
        - latched
      properties:
        latched:
          type: boolean
    NodeReference:
      type: string
      title: NodeReference
      description: String to reference another node
    UAStatusCode:
      type: string
      description: bitmask for status code
    LADSDeviceStateMachine:
      type: object
      properties:
        currentState:
          type: string
          enum:
            - initialization
            - operate
            - sleep
            - shutdown
        lastTransition:
          type: string
          enum:
            - initializationToOperate
            - operateToSleep
            - sleepToOperate
            - operateToShutdown
        statusCode:
          type: string
          description: >-
            OPC UA StatusCode name of the CurrentState read (e.g. "Good", "UncertainNoCommunicationLastUsableValue"). Drives online/offline independently of the operational currentState.
      required:
        - currentState
    MachineryItemState:
      type: object
      properties:
        currentState:
          $ref: '#/components/schemas/UAState'
        lastTransition:
          $ref: '#/components/schemas/UATransition'
        statusCode:
          type: string
          description: OPC UA StatusCode name of the CurrentState read.
      required:
        - currentState
    UAState:
      description: Possible values for device state that represent the current state
      enum:
        - executing
        - notAvailable
        - notExecuting
        - outOfService
      readOnly: true
    UATransition:
      description: >-
        Possible values for device state that represent a transition between states
      enum:
        - fromExecutingToExecuting
        - fromExecutingToNotAvailable
        - fromExecutingToOutOfService
        - fromNotAvailableToExecuting
        - fromNotAvailableToNotAvailable
        - fromNotAvailableToNotExecuting
        - fromNotAvailableToOutOfService
        - fromNotExecutingToExecuting
        - fromNotExecutingToNotAvailable
        - fromNotExecutingToNotExecuting
        - fromNotExecutingToOutOfService
        - fromOutOfServiceToExecuting
        - fromOutOfServiceToNotAvailable
        - fromOutOfServiceToNotExecuting
        - fromOutOfServiceToOutOfService
      readOnly: true
    UAFunctionalState:
      title: UAFunctionalState
      enum:
        - aborted
        - aborting
        - clearing
        - stopped
        - running
        - stopping
      readOnly: true
    UAExclusiveLimitState:
      title: UAExclusiveLimitState
      enum:
        - highHigh
        - high
        - low
        - lowLow
      description: Possible states of an AlarmMonitor
      readOnly: true
    UAExclusiveLimitTransition:
      title: UAExclusiveLimitTransition
      enum:
        - highToHighHigh
        - highHighToHigh
        - lowToLowLow
        - lowLowToLow
      description: Possible transitions of an AlarmMonitor
      readOnly: true
    UAExclusiveLimitValues:
      title: UAExclusiveLimitValues
      type: object
      description: |-
        Alarm threshold values from OPC UA AlarmMonitor (LimitAlarm).
        Contains the actual numeric threshold values.
      properties:
        highHighLimit:
          type: number
          description: Critical high threshold
        highLimit:
          type: number
          description: Warning high threshold
        lowLimit:
          type: number
          description: Warning low threshold
        lowLowLimit:
          type: number
          description: Critical low threshold
        onDelay:
          type: number
          description: Seconds the condition must hold before the alarm fires
        offDelay:
          type: number
          description: Seconds the condition must clear before the alarm clears
        userAccessLevel:
          $ref: '#/components/schemas/UAVariableAccessLevel'
      readOnly: true
    UADIDeviceHealthEnumeration:
      title: UADIDeviceHealthEnumeration
      enum:
        - NORMAL
        - FAILURE
        - CHECK_FUNCTION
        - OFF_SPEC
        - MAINTENANCE_REQUIRED
      description: |-
        Device Health states

        NORMAL:
          The Device functions normally.
        FAILURE:
          Malfunction of the Device or any of its peripherals.
          Typically caused device-internal or is process related.
        CHECK_FUNCTION:
          Functional checks are currently performed. Examples:
          Change of configuration, local operation, and substitute value entered.
        OFF_SPEC:
          "Off-spec" means that the Device is operating outside its specified range
          (e.g. measuring or temperature range) or that internal diagnoses indicate deviations
          from measured or set values due to internal problems in the Device or process characteristics.
        MAINTENANCE_REQUIRED:
          Although the output signal is valid, the wear reserve is nearly exhausted or a function will soon be restricted
          due to operational conditions e.g. build-up of deposits.
      readOnly: true
    UAAlarmCondition:
      type: object
      required:
        - browseName
        - displayName
        - eventId
        - eventType
        - sourceNode
        - receiveTime
        - message
        - severity
        - conditionName
        - enabledState
        - lastSeverity
        - ackedState
        - activeState
        - suppressedOrShelved
      properties:
        browseName:
          type: string
        displayName:
          type: string
        eventId:
          type: string
        eventType:
          type: string
        sourceNode:
          $ref: '#/components/schemas/NodeReference'
        sourceName:
          type: string
        time:
          type: string
          format: date-time
          readOnly: true
        receiveTime:
          type: string
          format: date-time
        message:
          type: string
        severity:
          type: number
          description: value between 1 (low) to 1000 (highest)
        conditionName:
          type: string
        retain:
          type: boolean
        enabledState:
          type: boolean
        quality:
          $ref: '#/components/schemas/UAStatusCode'
        lastSeverity:
          type: number
          description: value between 1 (low) to 1000 (highest)
        comment:
          type: string
          description: comment by user
        clientUserId:
          type: string
          description: user who made the comment
        ackedState:
          type: boolean
        confirmedState:
          type: boolean
          description: indicated if the alarm state has been confirmed or not
        activeState:
          type: boolean
          description: indicates if the alarm condition is currently active
        suppressedState:
          type: boolean
          description: indicated if the alarm condition is suppressed
        outOfServiceState:
          description: >-
            indicates if the alarm condition causes the device to be non functional / out of service
          type: boolean
        shelvingState:
          type: boolean
          description: indicated if the active alarm is shelved by a user
        suppressedOrShelved:
          type: boolean
          description: >-
            indicates if the active alarm condition shall be ignored by configuration.

            Either by shelfing a single occurance or if it es gernerally suppressed
    UAExclusiveLimitAlarm:
      allOf:
        - $ref: '#/components/schemas/UAAlarmCondition'
        - properties:
            limitState:
              anyOf:
                - $ref: '#/components/schemas/UAExclusiveLimitState'
                - $ref: '#/components/schemas/UAExclusiveLimitTransition'
              type: object
          required:
            - limitState
      type: object
    UAMachineryLifetimeVariable:
      type: object
      required:
        - displayName
        - engineeringUnits
        - startValue
        - limitValue
      properties:
        displayName:
          type: string
        engineeringUnits:
          type: string
        startValue:
          type: number
        limitValue:
          type: number
        indication:
          type: string
        warningValues:
          type: array
          items:
            type: number
    UAMachineryOperationCounter:
      type: object
      properties:
        operationCycleCounter:
          type: integer
          description: |-
            OperationCycleCounter is counting the times the
            component switches from not performing an
            activity to performing an activity. For example,
            each time a valve starts moving, is counted. This
            value shall only increase during the lifetime of
            the component and shall not be reset when the
            component is restarted.
        operationDuration:
          type: integer
          description: |-
            OperationDuration is the duration the
            MachineryItem has been powered and performing an
            activity. This counter is intended for machines
            and components where a distinction is made
            between switched on and in operation. For
            example, a drive might be powered on but not
            operating. It is not intended for machines or
            components always performing an activity like
            sensors always measuring data. This value shall
            only increase during the lifetime of the
            MachineryItem and shall not be reset when it is
            restarted. The OperationDuration is provided as
            Duration, i.e., in milliseconds or even fractions
            of a millisecond. However, the Server is not
            expected to update the value in such a high
            frequency, but maybe once a minute or once an
            hour, depending on the application.
        powerOnDuration:
          type: integer
          description: |-
            PowerOnDuration is the duration the MachineryItem
            has been powered. The main purpose is to
            determine the time in which degradation of the
            MachineryItem occurred. The details, when the
            time is counted, is implementation-specific.
            Companion specifications might define specific
            rules. Typically, when the MachineryItem has
            supply voltage and the main CPU is running, the
            time is counted. This may include any kind of
            sleep mode, but may not include pure Wake on LAN.
            This value shall only increase during the
            lifetime of the MachineryItem and shall not be
            reset when it is restarted. The PowerOnDuration
            is provided as Duration, i.e., in milliseconds or
            even fractions of a millisecond. However, the
            Server is not expected to update the value in
            such a high frequency, but maybe once a minute or
            once an hour, depending on the application.
    UAMaintenanceTask:
      type: object
    UALADSComponent:
      type: object
      required:
        - identification
        - browseName
        - displayName
      properties:
        browseName:
          type: string
        displayName:
          type: string
        assetId:
          type: string
          description: >-
            AssetId is a user writable alphanumeric character sequence uniquely identifying a component. The ID is provided by the integrator or user of thedevice.
        componentName:
          type: string
          description: >-
            ComponentName is a user writable name provided by the integrator or user of the component.
        hierarchicalLocation:
          type: string
          description: |-
            HierarchicalLocation provides the hierarchical
            location of the LADS Device. The structure inside
            the string may expose several levels. How this is
            exposed, which delimiters are used, etc. is
            vendor-specific. Examples of such strings are
            “FactoryA/BuildingC/Floor1” or
            “Area1-ProcessCell17-Unit4” (see OPC UA OPC
            10000-110 for more Details).
        operationalLocation:
          type: string
          description: |-
            OperationalLocation provides the operational
            location of the Device or Component. The
            structure within the string may expose several
            levels. How this is exposed, which delimiters are
            used, etc. is vendor-specific. Examples of such
            strings are “Warehouse1/Sheet3” or
            “StainlessSteelTote3” (see OPC UA OPC 10000-110
            for more details).
        identification:
          type: object
          required:
            - deviceClass
            - deviceManual
            - deviceRevision
            - hardwareRevision
            - manufacturer
            - manufacturerUri
            - model
            - productCode
            - productInstanceUri
            - revisionCounter
            - serialNumber
            - softwareRevision
          properties:
            deviceClass:
              type: string
              description: |-
                DeviceClass indicates in which domain or for what
                purpose a certain item for which the Interface is
                applied is used. Examples are
                “ProgrammableController”, “RemoteIO”, and
                “TemperatureSensor”.
            deviceManual:
              type: string
              description: |-
                DeviceManual allows specifying an address of the
                user manual. It may be a pathname in the file
                system or a URL (Web address).
              format: uri-reference
            deviceRevision:
              type: string
              description: |-
                DeviceRevision provides the overall revision
                level of a hardware component or the Device. As
                an example, this Property can be used in ERP
                systems together with the ProductCode Property.
            hardwareRevision:
              type: string
            manufacturer:
              type: string
            manufacturerUri:
              type: string
              format: uri
            model:
              type: string
            productCode:
              type: string
            productInstanceUri:
              type: string
              format: uri
            revisionCounter:
              type: string
            serialNumber:
              type: string
            softwareRevision:
              type: string
        deviceHealth:
          $ref: '#/components/schemas/UADIDeviceHealthEnumeration'
        deviceHealthAlarms:
          type: array
          items:
            $ref: '#/components/schemas/UAAlarmCondition'
        lifetimeCounters:
          type: array
          items:
            $ref: '#/components/schemas/UAMachineryLifetimeVariable'
        operationCounters:
          type: array
          items:
            $ref: '#/components/schemas/UAMachineryOperationCounter'
        maintenance:
          type: array
          items:
            $ref: '#/components/schemas/UAMaintenanceTask'
        components:
          type: array
          items:
            $ref: '#/components/schemas/UALADSComponent'
    UALADSDevice:
      allOf:
        - $ref: '#/components/schemas/UALADSComponent'
        - type: object
          required:
            - deviceState
          properties:
            deviceState:
              $ref: '#/components/schemas/LADSDeviceStateMachine'
            machineryItemState:
              $ref: '#/components/schemas/MachineryItemState'
            machineryOperationMode:
              enum:
                - maintenance
                - none
                - processing
                - setup
              description: |
                maintenance
                  MachineryItem is set into maintenance mode with
                  the intention to carry out maintenance or
                  servicing activities
                none
                  There is currently no operation mode available
                processing
                  MachineryItem is set into processing mode with
                  the intention to carry out the value adding
                  activities


                     setup:
                       MachineryItem is set into setup mode with the
                       intention to carry out setup, preparation or
                       postprocessing activities of a production process
              readOnly: true
            functionalUnitSet:
              type: array
              items:
                $ref: '#/components/schemas/UALADSFunctionalUnit'
    UALADSFunctionalUnit:
      type: object
      properties:
        browseName:
          type: string
        browsePath:
          type: string
          description: |-
            Canonical (source-side) browse path of this FunctionalUnit,
            e.g. "DeviceSet/FreezerDevice@0815/FunctionalUnitSet/FreezerUnit".
            For cross-mounted FUs (OrganizedFunctionalUnit) this is the
            source path, NOT the mount/host path. Use this for overrides,
            history queries, and source-device lookups.
        displayName:
          type: string
        type:
          type: string
          default: FunctionalUnitType
          description: |-
            Class of the functional unit.
            This can be used for manufacturer specific rendering for devices
        functionSet:
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/UAAnalogControlFunction'
              - $ref: '#/components/schemas/UAAnalogSensorFunction'
        lock:
          type: object
          properties:
            locked:
              type: boolean
            lockingClient:
              type: string
            lockingUser:
              type: string
            remainingLockTime:
              type: integer
        supportedPropertiesSet:
          type: object
        functionalUnitState:
          $ref: '#/components/schemas/UAFunctionalState'
        assetId:
          type: string
          description: |-
            AssetId is a user-writable alphanumeric character
            sequence the uniquely identifies a FunctionalUnit
            (see OPC UA 10000-100).
        componentName:
          type: string
          description: |-
            ComponentName is a user-writable name provided by
            the integrator or user of the FunctionalUnit.
        programManager:
          type: object
          description: >-
            ProgramManager with ActiveProgram from OPC UA LADS ProgramManagerType.
          properties:
            activeProgram:
              $ref: '#/components/schemas/UALADSActiveProgram'
      required:
        - browseName
        - browsePath
        - displayName
        - type
        - functionalUnitState
    UALADSActiveProgram:
      type: object
      description: |-
        ActiveProgram from OPC UA LADS ActiveProgramType (i=1040).
        Provides context about the currently active program on a FunctionalUnit.
      properties:
        currentProgramTemplate:
          type: string
          nullable: true
          description: Name of the currently executed program template.
        currentRuntime:
          type: number
          nullable: true
          description: Current run-time in milliseconds (excludes paused time).
        currentStepName:
          type: string
          nullable: true
          description: Name of the current step.
        currentStepNumber:
          type: integer
          nullable: true
          description: Index of the current step (1-based).
        currentStepRuntime:
          type: number
          nullable: true
          description: Runtime of the current step in milliseconds.
        estimatedRuntime:
          type: number
          nullable: true
          description: Estimated total run-time in milliseconds.
        estimatedStepNumbers:
          type: integer
          nullable: true
          description: Estimated total number of steps.
        estimatedStepRuntime:
          type: number
          nullable: true
          description: Estimated runtime of the current step in milliseconds.
        currentPauseTime:
          type: number
          nullable: true
          description: Accumulated pause time in milliseconds.
        deviceProgramRunId:
          type: string
          nullable: true
          description: Device-specific unique identifier for this program run.
      required:
        - currentProgramTemplate
        - currentRuntime
        - currentStepName
        - currentStepNumber
        - currentStepRuntime
        - estimatedRuntime
        - estimatedStepNumbers
        - estimatedStepRuntime
        - currentPauseTime
        - deviceProgramRunId
    UAFunctionValue:
      type: object
      properties:
        valuePrecision:
          type: integer
          description: precision of the value to display
        value:
          $ref: '#/components/schemas/UAVariable'
        accessLevel:
          $ref: '#/components/schemas/UAVariableAccessLevel'
        userAccessLevel:
          $ref: '#/components/schemas/UAVariableAccessLevel'
        historizing:
          type: boolean
          description: >-
            OPC UA standard attribute - true if history is being recorded for this variable
    UARange:
      type: object
      properties:
        low:
          type: number
        high:
          type: number
    UAVariable:
      type: object
      properties:
        serverTimestamp:
          type: string
          format: date-time
        sourceTimestamp:
          type: string
          format: date-time
        statusCode:
          $ref: '#/components/schemas/UAVariableStatusCode'
        value:
          oneOf:
            - type: number
            - type: string
      required:
        - serverTimestamp
        - statusCode
        - value
    UAVariableStatusCode:
      type: string
      description: OPC UA StatusCode symbolic name
      enum:
        - good
        - goodClamped
        - goodLocalOverride
        - uncertain
        - uncertainLastUsableValue
        - uncertainSubNormal
        - uncertainNoCommunicationLastUsableValue
        - uncertainEngineeringUnitsExceeded
        - bad
        - badUnexpectedError
        - badInternalError
        - badOutOfMemory
        - badCommunicationError
        - badEncodingError
        - badDecodingError
        - badEncodingLimitsExceeded
        - badRequestTooLarge
        - badResponseTooLarge
        - badNodeIdInvalid
        - badNodeIdUnknown
        - badAttributeIdInvalid
        - badNotConnected
        - badNotReadable
        - badNotWritable
        - badOutOfRange
        - badIndexRangeInvalid
        - badIndexRangeNoData
        - badUserAccessDenied
        - badNoCommunication
    UAAnalogUnitRange:
      allOf:
        - $ref: '#/components/schemas/UAFunctionValue'
        - type: object
          properties:
            instrumentRange:
              $ref: '#/components/schemas/UARange'
            euRange:
              $ref: '#/components/schemas/UARange'
            engineeringUnits:
              type: string
              description: unit of the physical quantity that is measured
            enumStrings:
              type: array
              items:
                type: string
              description: >-
                Possible discrete values for MultiStateDiscrete and TwoStateDiscrete types
    UADiscreteValue:
      allOf:
        - $ref: '#/components/schemas/UAFunctionValue'
        - type: object
          properties:
            enumStrings:
              type: array
              items:
                type: string
          required:
            - enumStrings
    UAVariableAccessLevel:
      type: array
      items:
        type: string
        enum:
          - currentRead
          - currentWrite
          - historyRead
          - historyWrite
          - semanticChange
          - statusWrite
          - timestampWrite
          - reserved
    UAFunction:
      type: object
      properties:
        browseName:
          type: string
        displayName:
          type: string
        type:
          type: string
          description: Specifies the concrete LADS type of the Function
        functionSet:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/UAAnalogSensorFunction'
              - $ref: '#/components/schemas/UAAnalogControlFunction'
              - $ref: '#/components/schemas/UADiscreteControlFunction'
        configuration:
          type: object
          description: |-
            Configuration is used to organize parameters for
            configuration of the Function.
        port:
          type: string
          nullable: true
          description: >-
            Physical port identifier for this Function (e.g. "left", "right", "first").

            Maps to the OPC UA Port property on the Function node.
        isEnabled:
          type: boolean
          description: >-
            IsEnabled indicates whether the Function can currently be executed on the Device.

            A Function may be disabled for several reasons including not licensed,

            missing hardware modules, or missing supplies
        alarmMonitor:
          $ref: '#/components/schemas/UAExclusiveLimitValues'
    UAAnalogControlFunction:
      allOf:
        - $ref: '#/components/schemas/UAFunction'
