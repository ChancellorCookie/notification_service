      enum:
        - Average
        - Minimum
        - Maximum
        - Count
        - Total
        - Range
    HistoryValueData:
      type: object
      description: Historical data for a specific value variable
      required:
        - browsePath
        - statusCode
        - historyData
      properties:
        browsePath:
          type: string
          description: >-
            OPC UA browse path to the value variable (e.g. TemperatureController/CurrentValue)
        statusCode:
          type: string
          description: 'OPC UA status code (e.g. Good, GoodNoData, BadNodeIdUnknown)'
        historyData:
          type: array
          items:
            $ref: '#/components/schemas/HistoryDataValue'
        continuationPoint:
          type: string
          nullable: true
          description: Continuation point for paging through large result sets
        engineeringUnits:
          type: string
        valuePrecision:
          type: number
        euRange:
          type: object
          properties:
            low:
              type: number
            high:
              type: number
        enumStrings:
          type: array
          items:
            type: string
    DiscoveredServer:
      type: object
      required:
        - endpointUrl
        - name
        - isOnline
        - isManual
      properties:
        id:
          type: string
          format: uuid
          description: Server UUID
        name:
          type: string
          description: Server-Name
          example: LADS Server 1
        endpointUrl:
          type: string
          description: OPC UA Endpoint URL
          example: 'opc.tcp://192.168.1.100:4840'
        applicationUri:
          type: string
          description: OPC UA Application URI
          example: 'urn:waldner:lads:server1'
        productUri:
          type: string
          description: OPC UA Product URI
        isOnline:
          type: boolean
          description: Server ist erreichbar
        isManual:
          type: boolean
          description: Manuell hinzugefügt (nicht auto-discovered)
        lastSeen:
          type: string
          format: date-time
          description: Letzter erfolgreicher Kontakt
        discoveredAt:
          type: string
          format: date-time
          description: Zeitpunkt der ersten Entdeckung
        hasCredentials:
          type: boolean
          description: Credentials sind für diesen Server konfiguriert
        description:
          type: string
          description: Optionale Beschreibung (nur für manuelle Server)
    DiscoveredServersResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredServer'
    ManualServerInput:
      type: object
      required:
        - name
        - endpointUrl
      properties:
        id:
          type: string
          format: uuid
          description: Optional - für Update eines bestehenden Servers
        name:
          type: string
          description: Server-Name
          example: Labor LADS Server
        endpointUrl:
          type: string
          description: OPC UA Endpoint URL
          example: 'opc.tcp://192.168.1.100:4840'
        description:
          type: string
          description: Optionale Beschreibung
          example: Hauptlabor Etage 2
        enabled:
          type: boolean
          description: Server aktiv (wird bei Discovery berücksichtigt)
          default: true
    ManualServer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        endpointUrl:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    ManualServerResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ManualServer'
    CredentialsInput:
      type: object
      required:
