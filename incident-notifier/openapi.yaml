          properties:
            sensorValue:
              $ref: '#/components/schemas/UAAnalogUnitRange'
    AlarmMonitorSettings:
      type: object
      description: Input for updating function alarm thresholds
      properties:
        highHighLimit:
          type: number
          description: Critical high threshold
        highLimit:
          type: number
          description: Warning high threshold
        lowLimit:
          type: number
          description: Warning low threshold
        lowLowLimit:
          type: number
          description: Critical low threshold
        enabledState:
          type: boolean
          description: >-
            Indicates if the alarm monitor is active or not. If disabled, the thresholds are still active, but no alarm is triggered
        onDelay:
          type: number
          description: >-
            Time interval in seconds during which an alarm condition must remain continuously true before the alarm becomes active.
        offDelay:
          type: number
          description: >-
            Time interval in seconds during which the alarm condition must remain cleared before the alarm becomes inactive.
    ValueOverrideInput:
      type: object
      description: Input for setting a value override on any OPC UA browse path
      required:
        - browsePath
        - value
        - dataType
        - referenceType
      properties:
        browsePath:
          type: string
          description: >-
            Full OPC UA browse path (e.g. DeviceSet/SP2DC800200/HierarchicalLocation)
        value:
          description: The override value
        dataType:
          type: string
          description: 'OPC UA data type name (e.g. String, Double, Boolean)'
        referenceType:
          type: string
          enum:
            - property
            - variable
          description: OPC UA reference type
    ValueOverride:
      type: object
      properties:
        browsePath:
          type: string
        value:
          description: The override value
        dataType:
          type: string
        referenceType:
          type: string
          enum:
            - property
            - variable
        updatedAt:
          type: string
          format: date-time
    OrganizedFunctionalUnitInput:
      type: object
      required:
        - sourceBrowsePath
        - targetBrowsePath
      properties:
        sourceBrowsePath:
          type: string
          description: >-
            Browse path of the source FunctionalUnit (e.g. DeviceSet/FreezerDevice@0815/FunctionalUnitSet/FreezerUnit)
          example: DeviceSet/FreezerDevice@0815/FunctionalUnitSet/FreezerUnit
        targetBrowsePath:
          type: string
          description: >-
            Browse path of the target FunctionalUnitSet that will organize the source (e.g. DeviceSet/myViscometer@4711/FunctionalUnitSet)
          example: DeviceSet/myViscometer@4711/FunctionalUnitSet
    OrganizedFunctionalUnit:
      type: object
      properties:
        sourceBrowsePath:
          type: string
        targetBrowsePath:
          type: string
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
    HistoryDataValue:
      type: object
