        historyData:
          type: array
          items:
            $ref: '#/components/schemas/HistoryDataValue'
        engineeringUnits:
          type: string
        valuePrecision:
          type: number
        euRange:
          type: object
          properties:
            low:
              type: number
            high:
              type: number
    AggregateFunctionEnum:
      type: string
