        - path
    Room:
      type: object
      properties:
        roomId:
          type: string
          description: Room ID
          example: entwicklungslabor
        contact:
          $ref: '#/components/schemas/RoomContact'
        number:
          type: string
          description: Room number
          example: A-101
        name:
          type: string
          description: Room name
          example: Entwicklungslabor
        airflow:
          $ref: '#/components/schemas/RoomAirflow'
        monitoring:
          type: array
          items:
            $ref: '#/components/schemas/RoomMonitoring'
          description: Monitoring functions for this room
      required:
        - roomId
        - number
        - contact
        - airflow
        - monitoring
    Meta:
      type: object
      properties:
        total:
          type: number
          description: Total number of items
        page:
          type: number
          description: Current page number
        perPage:
          type: number
          description: Items per page
    RoomList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Room'
        meta:
          $ref: '#/components/schemas/Meta'
      example:
        data:
          - roomId: entwicklungslabor
            contact:
              name: Moriz Walter
