openapi: 3.0.3
info:
  title: LCC API
  description: API for the LCC backend
  version: 1.0.0
  contact:
    name: Waldner Laboreinrichtungen
servers:
  - url: https://lcc.ieu.local/api/v2
tags:
  - name: Rooms
    description: Endpoints to manage rooms
  - name: Eco
    description: Endpoints to retrieve Information about the lab efficiency
  - name: Automation
    description: Entpoints to read and manage automations for integrated LADS devices
  - name: Incidents
    description: Endpoints to retrieve and manage incidents
  - name: LADS
    description: Interface to access the LADS device model in a REST/JSON representation
  - name: History
    description: Historical data access for LADS functions
  - name: Discovery
    description: OPC UA Server Discovery und Credentials Management
paths:
  /rooms/:
    get:
      operationId: getRooms
      tags:
        - Rooms
      summary: Get all rooms
      description: Retrieve a list of all rooms
      security:
        - oauth2:
            - Rooms.Read
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomList'
    post:
      operationId: createRoom
      tags:
        - Rooms
      summary: Create a new room
      description: Create a new room with the given ID and metadata
      security:
        - oauth2:
            - Rooms.Manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateInput'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '409':
          description: Room already exists
  '/rooms/{roomId}':
    get:
      operationId: getRoom
      tags:
        - Rooms
      summary: Get room by ID
      description: Retrieve a specific room by its ID
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room ID
          schema:
            type: string
      security:
        - oauth2:
            - Rooms.Read
      responses:
        '200':
          description: Room details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteRoom
      tags:
        - Rooms
      summary: Delete a room
      description: Delete a room and its monitoring references
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room ID
          schema:
            type: string
      security:
        - oauth2:
            - Rooms.Manage
      responses:
        '200':
          description: Room deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '404':
          description: Room not found
  '/rooms/{roomId}/meta':
    patch:
      operationId: updateRoomMeta
      tags:
        - Rooms
      summary: Update room meta data
      description: >-
        Update the metadata of a specific room, only submitted properties will be changed.

        To remove metadata, send a empty string.
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomMetaInput'
      security:
        - oauth2:
            - Rooms.Read
      responses:
        '200':
          description: Room details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/eco/{roomId}/stats':
    get:
      operationId: getRoomStats
      tags:
        - Eco
      summary: Get eco stats for a room
      description: Retrieve eco statistics for a specific room
      security:
        - oauth2:
            - Rooms.Read
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room ID
          schema:
            type: string
      responses:
        '200':
          description: Eco stats for the room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EcoStats'
  '/eco/{roomId}/recommendations':
    get:
      operationId: getRoomRecommendations
      tags:
        - Eco
      summary: Get eco recommendations for a room
      description: Retrieve eco recommendations for a specific room
      security:
        - oauth2:
            - Rooms.Read
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room ID
          schema:
            type: string
      responses:
        '200':
          description: Eco recommendations for the room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EcoRecommendations'
  /automations/:
    get:
      operationId: getAutomations
      tags:
        - Automation
      summary: Get automations
      description: Retrieve automations with optional filtering by room and device
      security:
        - oauth2:
            - Automations.Read
      parameters:
        - name: room
          in: query
          description: Filter by room ID
          required: false
          schema:
            type: string
        - name: device
          in: query
          description: Filter by device ID (can be multiple)
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: List of automations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutomationList'
    post:
      operationId: createAutomation
      tags:
        - Automation
      summary: Create a new automation
      description: Create a new automation
      security:
        - oauth2:
            - Automations.Manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationInput'
      responses:
        '201':
          description: Automation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Automation'
  '/automations/{automationId}':
    patch:
      operationId: updateAutomation
      tags:
        - Automation
      summary: Update an automation
      description: Update an existing automation
      security:
        - oauth2:
            - Automations.Write
      parameters:
        - name: automationId
          in: path
          required: true
          description: Automation ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationInput'
      responses:
        '200':
          description: Automation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Automation'
        '404':
          description: Automation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteAutomation
      tags:
        - Automation
      summary: Delete an automation
      description: Delete an existing automation
      security:
        - oauth2:
            - Automations.Manage
      parameters:
        - name: automationId
          in: path
          required: true
          description: Automation ID
          schema:
            type: string
      responses:
        '200':
          description: Automation deleted successfully
        '404':
          description: Automation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /incidents/:
    get:
      operationId: getIncidents
      tags:
        - Incidents
      summary: Read incidents
      description: 'Retrieve list of incidents, filtered by device and/or room'
      security:
        - oauth2:
            - Incidents.Read
      parameters:
        - name: room
          in: query
          description: Return only incidents that appeared in the specified room
          schema:
            type: string
        - name: context
          in: query
          description: "Filter the result set to incidents, that are attached to the given context. This is a prefix filter and will also match context below the given string. A filter on `DeviceSet/S1-1016939` will also return incidents with context `DeviceSet/S1-1016939/FunctionalUnitSet/Fumehood/FunctionSet/Airflow`.\nIf Functional Units are linked into a device, the filter also return the incidents of the origin device.  \nExample:   If following link is configured: `DeviceSet/S1-1016939/FunctionalUnitSet/SensorPanel -> DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200`   and the context parameter contains `DeviceSet/S1-1016939`, the result will also contain incidents from `DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200/FunctionSet/1` since the Function also appear in the context of the queried device.\n"
          schema:
            type: string
        - name: severity
          in: query
          schema:
            $ref: '#/components/schemas/IncidentSeverity'
          explode: true
          description: filter incidents by severity
        - name: active
          in: query
          schema:
            type: boolean
          description: filter for active / inactive incidents
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/IncidentStatus'
          explode: true
          description: filter incident by current status
        - name: lifecycle
          in: query
          schema:
            type: string
            enum:
              - open
              - resolved
          description: >
            Operator lifecycle filter (strict-mode aware): "open" = not yet resolved/done, "resolved" = done. Independent of `status`.

        - name: limit
          in: query
          description: >
            Maximum number of items to return. Used together with `offset` for pagination.

          schema:
            type: integer
            minimum: 0
            default: 20
        - name: offset
          in: query
          description: >
            Number of items to skip before starting to return results. Defines the starting position of the returned slice when used together with `limit`.

          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Incident Query Result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentQueryResponse'
  '/incidents/{incidentId}':
    get:
      operationId: getIncident
      tags:
        - Incidents
      summary: Read incident
      description: Retrieve an incidents by id
      security:
        - oauth2:
            - Incidents.Read
      parameters:
        - name: incidentId
          in: path
          required: true
          description: Incident ID
          schema:
            type: string
      responses:
        '200':
          description: Incidents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentResponse'
  '/incidents/{incidentId}/history':
    get:
      operationId: getIncidentHistory
      tags:
        - Incidents
      summary: Read all status changes of an incident
      description: >
        Returns all Status changes of an incident and their origin. Items are ordered by time

      security:
        - oauth2:
            - Incidents.Read
      parameters:
        - name: incidentId
          in: path
          description: Incident ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of IncidentStatus items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentHistoryResponse'
  /lads/DeviceSet:
    get:
      operationId: getDevices
      tags:
        - LADS
      description: Returns global DeviceSet (deviceIds are suffixed with serverId)
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - name: hierarchicalLocation
          in: query
          schema:
            type: string
          description: filter device for the hirarchical location attribute
          example: DE/Wangen/Building_24/24_00_00_rechts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UALADSDevice'
  '/lads/DeviceSet/{deviceId}':
    get:
      operationId: getDevice
      tags:
        - LADS
      description: Returns Device details (deviceIds are suffixed with serverId)
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
      responses:
        '200':
          description: successfull operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UALADSDevice'
  '/lads/DeviceSet/{deviceId}/FunctionalUnitSet':
    get:
      operationId: getFunctionalUnits
      tags:
        - LADS
      security:
        - oauth2:
            - Devices.Read
      description: Returns FunctionalUnitSet of device
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UALADSFunctionalUnit'
  '/lads/DeviceSet/{deviceId}/FunctionalUnitSet/{functionalUnitId}':
    get:
      operationId: getFunctionalUnit
      tags:
        - LADS
      security:
        - oauth2:
            - Devices.Read
      description: Returns FunctionalUnitSet details
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UALADSFunctionalUnit'
  '/lads/DeviceSet/{deviceId}/FunctionalUnitSet/{functionalUnitId}/FunctionSet':
    get:
      operationId: getFunctions
      tags:
        - LADS
      security:
        - oauth2:
            - Devices.Read
      description: Returns FunctionSet of FunctionalUnit
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UAFunction'
  '/lads/DeviceSet/{deviceId}/FunctionalUnitSet/{functionalUnitId}/FunctionSet/{functionId}':
    get:
      operationId: getFunction
      tags:
        - LADS
      security:
        - oauth2:
            - Devices.Read
      description: Returns Function details
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
        - $ref: '#/components/parameters/ParamFunctionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UAFunction'
  '/lads/DeviceSet/{deviceId}/FunctionalUnitSet/{functionalUnitId}/FunctionSet/{functionId}/alarmMonitor':
    put:
      operationId: updateAlarmMonitor
      tags:
        - LADS
      description: Updates alarm monitor settings for a Function
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
        - $ref: '#/components/parameters/ParamFunctionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlarmMonitorSettings'
      responses:
        '200':
          description: Alarm monitor updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UAFunction'
        '403':
          description: Alarm limits are read-only (configured on the device)
        '404':
          description: Function not found
    delete:
      operationId: deleteAlarmMonitor
      tags:
        - LADS
      description: Removes user-defined alarm monitor settings for a Function
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
        - $ref: '#/components/parameters/ParamFunctionId'
      responses:
        '204':
          description: Alarm monitor settings removed successfully
        '403':
          description: Alarm limits are read-only (configured on the device)
        '404':
          description: Function not found
  /lads/override:
    post:
      operationId: setOverride
      tags:
        - LADS
      description: Sets a value override on any OPC UA browse path
      security:
        - oauth2:
            - Devices.Write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValueOverrideInput'
      responses:
        '200':
          description: Override set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValueOverride'
    delete:
      operationId: removeOverride
      tags:
        - LADS
      description: Removes a value override
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - name: browsePath
          in: query
          required: true
          schema:
            type: string
          description: The browse path of the override to remove
      responses:
        '200':
          description: Override removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
  /lads/overrides:
    get:
      operationId: getOverrides
      tags:
        - LADS
      description: Lists all value overrides
      security:
        - oauth2:
            - Devices.Read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ValueOverride'
  /lads/organized-functional-unit:
    post:
      operationId: createOrganizedFunctionalUnit
      tags:
        - LADS
      description: >
        Creates an OPC UA "Organizes" reference so that a FunctionalUnit from one device appears in another device's FunctionalUnitSet. Example: FreezerUnit from FreezerDevice@0815 is organized by myViscometer@4711's FunctionalUnitSet.

      security:
        - oauth2:
            - Devices.Write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizedFunctionalUnitInput'
      responses:
        '200':
          description: Mapping created (or updated if already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizedFunctionalUnit'
    delete:
      operationId: deleteOrganizedFunctionalUnit
      tags:
        - LADS
      description: Soft-deletes an organized FunctionalUnit mapping
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - name: sourceBrowsePath
          in: query
          required: true
          schema:
            type: string
          description: Browse path of the source FunctionalUnit
        - name: targetBrowsePath
          in: query
          required: true
          schema:
            type: string
          description: Browse path of the target FunctionalUnitSet
      responses:
        '200':
          description: Mapping removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: boolean
        '404':
          description: Mapping not found or already deleted
  /lads/organized-functional-units:
    get:
      operationId: getOrganizedFunctionalUnits
      tags:
        - LADS
      description: Lists all active organized FunctionalUnit mappings
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - name: targetBrowsePath
          in: query
          required: false
          schema:
            type: string
          description: Optional filter by target FunctionalUnitSet browse path
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizedFunctionalUnit'
  '/lads/alarms/{incidentId}/ack':
    post:
      operationId: ackAlarm
      tags:
        - LADS
      summary: Acknowledge an alarm incident
      description: >
        Resolves the incidentId (stable hash) to its OPC UA source node and raises an AuditConditionAcknowledgeEventType on it. The historian persists the event, which flips the IncidentsService state-fold to ACKNOWLEDGED on next read.

      security:
        - oauth2:
            - Incidents.Manage
      parameters:
        - name: incidentId
          in: path
          required: true
          description: Stable incident id (SHA-1 of the source node id)
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckAlarmRequest'
      responses:
        '204':
          description: Acknowledged
        '404':
          description: Incident or source node not found
  '/lads/alarms/{incidentId}/confirm':
    post:
      operationId: confirmAlarm
      tags:
        - LADS
      summary: Confirm an alarm incident (follow-up to acknowledge)
      description: >
        Raises an AuditConditionConfirmEventType on the alarm's source node. State-fold flips to CONFIRMED.

      security:
        - oauth2:
            - Incidents.Manage
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmAlarmRequest'
      responses:
        '204':
          description: Confirmed
        '404':
          description: Incident or source node not found
  '/lads/alarms/{incidentId}/report':
    post:
      operationId: reportAlarm
      tags:
        - LADS
      summary: 'Report an alarm incident (escalation, distinct from Ack)'
      description: >
        Raises an AuditConditionReportedEventType (Essentim companion spec, ns=…;i=15001) on the alarm's source node. Independent of Ack and Confirm — represents an escalation/notification step in the operator workflow. State-fold flips to REPORTED.

      security:
        - oauth2:
            - Incidents.Manage
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportAlarmRequest'
      responses:
        '204':
          description: Reported
        '404':
          description: Incident or source node not found
  '/lads/alarms/{incidentId}/reset':
    post:
      operationId: resetAlarm
      tags:
        - LADS
      summary: Reset a latched alarm
      description: >
        Calls the Reset (or Reset2 if comment provided) method on the alarm's OPC UA condition node. Clears LatchedState and re-evaluates the input; the alarm transitions to inactive when the underlying condition is gone, otherwise it stays active.

      security:
        - oauth2:
            - Incidents.Manage
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetAlarmRequest'
      responses:
        '204':
          description: Reset accepted
        '404':
          description: Incident or source node not found
        '409':
          description: Source node has no Reset method
  '/lads/alarms/{incidentId}/latched':
    patch:
      operationId: setAlarmLatched
      tags:
        - LADS
      summary: Toggle the LatchedState property of an alarm
      description: >
        Sets the LatchedState (TwoStateVariable). When TRUE, the alarm cannot deactivate until the next Reset call. When FALSE, normal active/ inactive transitions resume.

      security:
        - oauth2:
            - Incidents.Manage
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAlarmLatchedRequest'
      responses:
        '204':
          description: Updated
        '404':
          description: Incident or source node not found
        '409':
          description: Alarm has no LatchedState property
  '/lads/history/{deviceId}/FunctionalUnitSet/{functionalUnitId}/FunctionSet/{functionId}/values':
    get:
      operationId: readHistoryValue
      tags:
        - History
      summary: Read raw historical values
      description: >-
        Returns raw historical data points for a function's SensorValue or CurrentValue
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
        - $ref: '#/components/parameters/ParamFunctionId'
        - $ref: '#/components/parameters/ParamStartTime'
        - $ref: '#/components/parameters/ParamEndTime'
        - $ref: '#/components/parameters/ParamNumValuesPerNode'
        - $ref: '#/components/parameters/ParamContinuationPoint'
      responses:
        '200':
          description: Historical values retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryReadResponse'
        '404':
          description: Function or historical data not found
  '/lads/history/{deviceId}/FunctionalUnitSet/{functionalUnitId}/FunctionSet/{functionId}/values/export':
    get:
      operationId: exportHistoryValues
      tags:
        - History
      summary: Export historical values as CSV
      description: >-
        Streams all historical data points as CSV for data export over large time ranges. Uses PostgreSQL cursors for constant memory usage.
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
        - $ref: '#/components/parameters/ParamFunctionId'
        - $ref: '#/components/parameters/ParamStartTime'
        - $ref: '#/components/parameters/ParamEndTime'
      responses:
        '200':
          description: CSV file with historical data
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '404':
          description: Function or historical data not found
  '/lads/history/{deviceId}/FunctionalUnitSet/{functionalUnitId}/FunctionSet/{functionId}/aggregate':
    get:
      operationId: readAggregateValue
      tags:
        - History
      summary: Read aggregated historical values
      description: >-
        Returns aggregated historical data (Average, Min, Max, etc.) for a function
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - $ref: '#/components/parameters/ParamDeviceId'
        - $ref: '#/components/parameters/ParamFunctionalUnitId'
        - $ref: '#/components/parameters/ParamFunctionId'
        - $ref: '#/components/parameters/ParamStartTime'
        - $ref: '#/components/parameters/ParamEndTime'
        - $ref: '#/components/parameters/ParamAggregateFunction'
        - $ref: '#/components/parameters/ParamProcessingInterval'
        - $ref: '#/components/parameters/ParamVariablePath'
      responses:
        '200':
          description: Aggregated values retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregateReadResponse'
        '404':
          description: Function or historical data not found
  /discovery/servers:
    get:
      operationId: getDiscoveredServers
      tags:
        - Discovery
      summary: Liste aller entdeckten OPC UA Server
      description: >-
        Gibt nur Online-Server zurück. Offline-Server bleiben in der DB (für Credential-Zuordnung), werden aber nicht angezeigt.
      security:
        - oauth2:
            - Devices.Read
      responses:
        '200':
          description: Liste der Server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveredServersResponse'
    post:
      operationId: upsertManualServer
      tags:
        - Discovery
      summary: Manuellen Server hinzufügen/aktualisieren
      description: >-
        Fügt einen manuellen Server hinzu oder aktualisiert einen bestehenden (Upsert via ID oder endpointUrl)
      security:
        - oauth2:
            - Devices.Write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualServerInput'
      responses:
        '200':
          description: Server gespeichert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualServerResponse'
        '400':
          description: Ungültige Eingabe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
  '/discovery/servers/{serverId}':
    delete:
      operationId: deleteManualServer
      tags:
        - Discovery
      summary: Manuellen Server entfernen
      description: >-
        Entfernt einen manuell hinzugefügten Server. Entdeckte Server können nicht gelöscht werden.
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - name: serverId
          in: path
          required: true
          description: Server UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Server gelöscht
        '404':
          description: Server nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
  '/discovery/servers/{serverId}/credentials':
    get:
      operationId: getServerCredentials
      tags:
        - Discovery
      summary: Credentials-Metadaten abrufen
      description: Gibt Metadaten zu den Credentials zurück (ohne Passwörter/Private Keys)
      security:
        - oauth2:
            - Devices.Read
      parameters:
        - name: serverId
          in: path
          required: true
          description: Server UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Credentials-Metadaten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsMetaResponse'
        '404':
          description: Keine Credentials gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
    put:
      operationId: upsertServerCredentials
      tags:
        - Discovery
      summary: Credentials speichern
      description: Speichert Credentials für diesen Server
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - name: serverId
          in: path
          required: true
          description: Server UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsInput'
      responses:
        '200':
          description: Credentials gespeichert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsMetaResponse'
        '400':
          description: Ungültige Eingabe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
    delete:
      operationId: deleteServerCredentials
      tags:
        - Discovery
      summary: Credentials löschen
      description: Löscht die Credentials für diesen Server
      security:
        - oauth2:
            - Devices.Write
      parameters:
        - name: serverId
          in: path
          required: true
          description: Server UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Credentials gelöscht
        '404':
          description: Credentials nicht gefunden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
components:
  schemas:
    RoomMetaInput:
      type: object
      properties:
        contact:
          $ref: '#/components/schemas/RoomContact'
        number:
          type: string
          description: Room number
          example: A-101
        name:
          type: string
          description: Room name
          example: Entwicklungslabor
        monitoring:
          type: array
          items:
            $ref: '#/components/schemas/RoomMonitoring'
    RoomContact:
      type: object
      properties:
        name:
          type: string
          description: Contact person name
        email:
          type: string
          format: email
          description: Contact email address
        details:
          type: string
          description: Additional contact details
    RoomAirflow:
      type: object
      properties:
        min:
          type: number
          nullable: true
          description: Minimum airflow value
        max:
          type: number
          nullable: true
          description: Maximum airflow value
      required:
        - min
        - max
    RoomMonitoring:
      type: object
      properties:
