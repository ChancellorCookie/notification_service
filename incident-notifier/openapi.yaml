                  DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200/FunctionSet/1
              - path: >-
                  DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200/FunctionSet/2
          - roomId: office-essentim
            contact:
              name: Bruno Schliersmair
              email: bruno.schliersmair@essentimm.com
              details: Großraum
            number: B-201
            name: Office Essentim
            airflow:
              min: 800
              max: 1800
            monitoring:
              - name: Room Temp
                path: >-
                  DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200/FunctionSet/1
        meta:
          total: 2
          page: 1
          perPage: 10
    RoomResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Room'
      example:
        data:
          roomId: entwicklungslabor
          contact:
            name: Moriz Walter
            email: moriz.walter@waldner.de
            details: T.345
          number: A-101
          name: Entwicklungslabor
          airflow:
            min: 1200
            max: 2400
          monitoring:
            - name: Room Temp
              path: >-
                DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200/FunctionSet/1
            - path: >-
                DeviceSet/SP2DC800200/FunctionalUnitSet/SP2DC800200/FunctionSet/2
    RoomCreateInput:
      type: object
      required:
        - roomId
