        authType:
          type: string
          enum:
            - anonymous
            - username
            - certificate
          description: Authentifizierungstyp
        username:
          type: string
          description: Benutzername (nur bei authType=username)
        password:
          type: string
          format: password
          description: Passwort (nur bei authType=username)
        certificate:
          type: string
          format: byte
          description: Base64-encoded X.509 Zertifikat (nur bei authType=certificate)
        privateKey:
          type: string
          format: byte
          description: Base64-encoded Private Key (nur bei authType=certificate)
    CredentialsMeta:
      type: object
      properties:
        id:
          type: string
          format: uuid
