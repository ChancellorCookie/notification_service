  securitySchemes:
    oauth2:
      name: dex
      description: |
        Authenticates against OAuth IDP.
      type: oauth2
      x-issuer: 'https://lcc.ieu.local/oauth'
      x-audience: lcc-api-docs
      flows:
        authorizationCode:
          authorizationUrl: 'https://lcc.ieu.local/oauth/auth'
          tokenUrl: 'https://lcc.ieu.local/oauth/token'
          scopes:
            openid: Required for OpenID Connect authentication and ID token issuance.
            profile: Allows access to the user's basic profile information.
            email: Allows access to the user's email address.
            Rooms.Read: read rooms and eco recommendations
            Rooms.Write: modify room settings
            Rooms.Manage: create or delete rooms
            Devices.Read: read device information
            Devices.Write: modify device properties
            Devices.Control: remote control devices
            Devices.Manage: add or remove devices
            Automations.Manage: create or delete automations
            Automations.Read: read automations
            Automations.Write: modify automations
            Incidents.Read: read incidents
            Incidents.Create: create incidents
            Incidents.Manage: report or confirm incidents
  parameters:
    ParamDeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
      description: browsename of the device
      example: S1-1016939
    ParamFunctionalUnitId:
      name: functionalUnitId
      in: path
      required: true
      schema:
        type: string
      description: browsename of the functionalUnit
      example: LuminescenceReaderUnit
    ParamFunctionId:
      name: functionId
      in: path
      required: true
      schema:
        type: string
      description: browsename of the function
      example: Injector1
    ParamStartTime:
      name: startTime
      in: query
      required: true
      schema:
        type: string
        format: date-time
      description: Start of time range (ISO 8601)
      example: '2026-02-17T00:00:00Z'
    ParamEndTime:
      name: endTime
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: End of time range (ISO 8601). Defaults to current time if omitted.
      example: '2026-02-17T12:00:00Z'
    ParamNumValuesPerNode:
      name: numValuesPerNode
      in: query
      required: false
      schema:
        type: integer
        default: 1000
      description: Maximum number of values to return
    ParamAggregateFunction:
      name: aggregateFunction
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/AggregateFunctionEnum'
      description: Aggregate function to apply
    ParamProcessingInterval:
      name: processingInterval
      in: query
      required: true
      schema:
        type: integer
      description: 'Bucket size in milliseconds (e.g., 3600000 = 1 hour)'
      example: 3600000
    ParamVariablePath:
      name: variablePath
      in: query
      required: false
      schema:
        type: string
      description: >-
        Optional path to specific value variable (e.g., "SensorValue", "CurrentValue")
      example: SensorValue
    ParamContinuationPoint:
      name: continuationPoint
      in: query
      required: false
      schema:
        type: string
      description: >-
        Continuation point from a previous response to fetch the next page of results
