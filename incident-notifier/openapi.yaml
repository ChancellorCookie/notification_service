        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    CredentialsMetaResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CredentialsMeta'
    Error1:
      type: object
