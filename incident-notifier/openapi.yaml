              $ref: '#/components/schemas/UAAnalogUnitRange'
            targetValue:
              $ref: '#/components/schemas/UAAnalogUnitRange'
            controlFunctionState:
              $ref: '#/components/schemas/UAFunctionalState'
    UADiscreteControlFunction:
      allOf:
        - $ref: '#/components/schemas/UAFunction'
        - type: object
          properties:
            currentValue:
              $ref: '#/components/schemas/UADiscreteValue'
            targetValue:
              $ref: '#/components/schemas/UADiscreteValue'
            controlFunctionState:
              $ref: '#/components/schemas/UAFunctionalState'
        - type: object
          properties:
            enumStrings:
              type: array
              items:
                type: string
    UAAnalogSensorFunction:
      allOf:
        - $ref: '#/components/schemas/UAFunction'
